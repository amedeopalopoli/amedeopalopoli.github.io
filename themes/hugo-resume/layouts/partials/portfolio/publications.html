<section class="resume-section p-3 p-lg-5 d-flex flex-column" id="publications">
  <div class="my-auto" id="publications-content">
    <h2 class="mb-5">{{ i18n "publications" }}</h2>
    <div>
      {{ range site.Data.publications }}
        <div class="mb-4">
          <div class="subheading mb-1" style="line-height:1.4;">{{ .title }} <span style="font-weight:400;">({{ .year }})</span></div>
          <div class="text-muted" style="line-height:1.4;">{{ .authors }}</div>
          <div style="line-height:1.4;">{{ .description }}</div>
          <a href="{{ .link }}" target="_blank">Link</a>
        </div>
      {{ end }}
    </div>
  </div>
</section>
